name: Build Debian Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-debian:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [bookworm, trixie]

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential debhelper dh-python \
          python3-all python3-setuptools \
          devscripts lintian

    - name: Build package for ${{ matrix.distro }}
      run: |
        export DISTRO=${{ matrix.distro }}
        export VERSION=${GITHUB_REF#refs/tags/v}
        ./scripts/build-debian-packages.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: debian-${{ matrix.distro }}
        path: debian-packages/${{ matrix.distro }}/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: debian-packages/${{ matrix.distro }}/*.deb